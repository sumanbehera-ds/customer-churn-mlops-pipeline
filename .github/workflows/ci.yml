name: Customer Churn MLOps CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python imports
        run: |
          python -c "import pandas, sklearn, imblearn, xgboost, fastapi, uvicorn, mlflow, dvc, pytest"

      - name: Validate DVC pipeline
        run: |
          dvc dag
          dvc repro --dry --allow-missing

      - name: Check project files exist
        run: |
          test -f app.py
          test -f Dockerfile
          test -f requirements.txt
          test -f src/models/train_model.py
          test -f src/models/predict_model.py
          test -f src/features/build_features.py
          test -f src/data/make_dataset.py
          test -f monitoring/drift_report.py
          test -f reports/monitoring_summary.json
          test -f reports/monitoring_report.html

      - name: Run tests
        run: |
          python -m pytest tests/
